services:
  raffle:
    build: .
    container_name: google-form-raffle
    restart: unless-stopped
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ./data:/app/data
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8765
      OPEN_BROWSER: "0"
      ALLOW_SHUTDOWN: "0"
      DB_PATH: /app/data/vrc_raffle.db
      AUTH_REQUIRED: ${AUTH_REQUIRED:-0}
      X_CLIENT_ID: ${X_CLIENT_ID:-}
      X_CLIENT_SECRET: ${X_CLIENT_SECRET:-}
      X_REDIRECT_URI: ${X_REDIRECT_URI:-http://127.0.0.1:8765/auth/callback}
      SESSION_SECRET: ${SESSION_SECRET:-}
      ALLOWED_X_USER_IDS: ${ALLOWED_X_USER_IDS:-}
      ALLOWED_X_USERNAMES: ${ALLOWED_X_USERNAMES:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-0}
